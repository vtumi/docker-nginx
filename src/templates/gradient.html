<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport"content="width=device-width, initial-scale=1.0"><title>{{hostname}}-用户登录</title><style type="text/css">*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}body{background-color:#f5f5f5;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}.login-container{background:white;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.1);width:100%;max-width:400px;padding:30px;animation:fadeIn 0.3s ease-out}@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}.login-header{text-align:center;margin-bottom:30px}.login-header h1{color:#333;font-size:24px;font-weight:600;margin-bottom:10px}.login-header p{color:#f56c6c;font-size:14px}.input-group{margin-bottom:20px;position:relative}.input-group label{display:block;margin-bottom:8px;color:#666;font-size:14px;font-weight:500}.input-group input{width:100%;padding:15px;border:1px solid#e0e0e0;border-radius:8px;font-size:16px;transition:border 0.3s}.input-group input:focus{border-color:#4a90e2;outline:none}.login-button{width:100%;padding:15px;background:linear-gradient(135deg,#4a90e2,#6bb9f0);border:none;border-radius:8px;color:white;font-size:16px;font-weight:600;cursor:pointer;transition:opacity 0.3s}.login-button:hover{opacity:0.9}</style></head><body><div class="login-container"><div class="login-header"><h1>用户登录</h1>{{loginfailed}}<p>认证失败，请确认账号、密码或验证码是否正确</p>{{/loginfailed}}</div><form method="post"action="login"><div class="input-group"><label for="username">账号</label><input type="text"id="username"name="username"placeholder="请输入账号"required="required"/></div><div class="input-group"><label for="password">密码</label><input type="password"id="password"name="password"placeholder="请输入密码"required="required"/></div><div class="input-group"><label for="totp">验证码</label><input type="text"id="totp"name="totp"placeholder="请输入验证码"required="required"/></div><input type="hidden"name="follow_page"value="{{follow_page}}"/><button type="submit"class="login-button">登录</button></form></div></body></html>
